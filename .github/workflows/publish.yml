name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to publish, usually a tag like v0.1.7"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          actual_tag="$(git describe --tags --exact-match)"
          expected_tag="v$(node -p "require('./package.json').version")"
          if [[ "${actual_tag}" != "${expected_tag}" ]]; then
            echo "expected tag ${expected_tag}, got ${actual_tag}" >&2
            exit 1
          fi

      - name: Verify public package metadata
        run: bash tools/tests/test-package-public-metadata.sh

      - name: Publish to npm
        shell: bash
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "npm package ${package_name}@${package_version} is already published; skipping duplicate publish"
            exit 0
          fi

          npm publish --provenance --access public

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ inputs.git_ref || github.ref }}"
          VERSION="${TAG#refs/tags/v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Read CHANGELOG for this version
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract section for this version from CHANGELOG.md
          python3 << 'PY'
          import re, sys

          version = "${{ steps.version.outputs.version }}"
          with open("CHANGELOG.md", "r") as f:
              content = f.read()

          # Find section for this version
          pattern = rf"##\s+\[{re.escape(version)}\].*?(?=\n##\s+\[|\Z)"
          match = re.search(pattern, content, re.DOTALL)
          if match:
              section = match.group(0).strip()
              # Remove the header line
              lines = section.split("\n")
              # Skip the first line (header)
              body = "\n".join(lines[1:]).strip()
              print(body)
          else:
              print(f"No changelog found for version {version}")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: agent-control-plane v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
