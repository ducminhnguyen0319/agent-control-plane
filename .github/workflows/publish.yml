name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to publish, usually a tag like v0.1.7"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          actual_tag="$(git describe --tags --exact-match)"
          expected_tag="v$(node -p "require('./package.json').version")"
          if [[ "${actual_tag}" != "${expected_tag}" ]]; then
            echo "expected tag ${expected_tag}, got ${actual_tag}" >&2
            exit 1
          fi

      - name: Verify public package metadata
        run: bash tools/tests/test-package-public-metadata.sh

      - name: Publish to npm
        shell: bash
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "npm package ${package_name}@${package_version} is already published; skipping duplicate publish"
            exit 0
          fi

          npm publish --provenance --access public
