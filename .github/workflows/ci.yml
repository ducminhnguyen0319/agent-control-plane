name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Verify package metadata
        run: bash tools/tests/test-package-public-metadata.sh

      - name: Run npm tests
        run: npm test

      - name: Check package tarball
        run: npm pack --dry-run
